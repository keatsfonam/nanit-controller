apiVersion: v1
kind: Service
metadata:
  name: nanit-relay
  # Pin the external IP so NANIT_RTMP_PUBLIC_ADDR stays valid, e.g. with
  # MetalLB or Cilium LB-IPAM:
  #
  # annotations:
  #   metallb.universe.tf/loadBalancerIPs: 192.168.1.10
  #   lbipam.cilium.io/ips: 192.168.1.10
spec:
  type: LoadBalancer
  # Replace this with the camera and NVR networks. Do not expose plaintext
  # RTMP/RTSP ports to untrusted networks.
  loadBalancerSourceRanges:
    - 192.168.1.0/24
  # Preserve source addresses for MediaMTX's publisher CIDR restriction.
  externalTrafficPolicy: Local
  ports:
    - name: rtmp
      port: 1935
      targetPort: rtmp
      protocol: TCP
    - name: rtsp
      port: 8554
      targetPort: rtsp
      protocol: TCP
  selector:
    app.kubernetes.io/name: nanit-relay
