apiVersion: v1
kind: ConfigMap
metadata:
  name: nanit-relay-config
data:
  mediamtx.yml: |
    logLevel: info
    logDestinations:
      - stdout

    # The controller is the only API client. Keep the listener on loopback.
    api: true
    apiAddress: 127.0.0.1:9997
    metrics: false
    pprof: false
    playback: false

    authMethod: internal
    authInternalUsers:
      # Nanit publisher authentication is not enabled: camera support for
      # MediaMTX's RTMP query-string credentials is unverified. Restrict this
      # CIDR and the LoadBalancer source ranges to the camera network.
      - user: any
        pass:
        ips:
          - "192.168.1.0/24"
        permissions:
          - action: publish
            path: "~^local/[A-Za-z0-9_-]+$"
      # The Deployment overrides these two values from nanit-secret.
      - user: replace-reader
        pass: replace-password
        ips:
          - "192.168.1.0/24"
        permissions:
          - action: read
            path: "~^local/[A-Za-z0-9_-]+$"
      - user: any
        pass:
        ips:
          - "127.0.0.1"
          - "::1"
        permissions:
          - action: api

    rtsp: true
    rtspAddress: :8554
    rtspTransports:
      - tcp

    rtmp: true
    rtmpAddress: :1935

    hls: false
    webrtc: false
    srt: false
    moq: false

    pathDefaults:
      source: publisher
      record: false

    paths:
      all_others:
