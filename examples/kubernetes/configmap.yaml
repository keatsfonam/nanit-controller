apiVersion: v1
kind: ConfigMap
metadata:
  name: nanit-relay-config
data:
  mediamtx.yml: |
    logLevel: info
    logDestinations:
      - stdout

    # The controller reads this API over localhost; don't expose it.
    api: true
    apiAddress: :9997
    metrics: false
    pprof: false
    playback: false

    rtsp: true
    rtspAddress: :8554
    rtspTransports:
      - tcp

    rtmp: true
    rtmpAddress: :1935

    hls: false
    webrtc: false
    srt: false

    pathDefaults:
      source: publisher
      record: false

    paths:
      all_others:
